name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  API_IMAGE: plant-monitor-api
  GUI_IMAGE: plant-monitor-gui

jobs:
  # LINT — runs on every push and pull request
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lint tools
        run: pip install flake8 black

      - name: Lint with flake8 (syntax errors only)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,__pycache__,.venv,venv,build,dist

      # Reports formatting issues but does NOT fail the build.
      # Remove "continue-on-error" once your code is fully black-formatted.
      - name: Check formatting with black (informational)
        run: black --check --diff .
        continue-on-error: true

  # BUILD IMAGES — proves both Docker images build (every push and PR). No push.
  build-images:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, gui]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:ci

  # RELEASE — on push to main, publish images to GitHub Container Registry.
  # Tied to the "release" environment, so a successful run = a GREEN deployment.
  # Uses the built-in GITHUB_TOKEN: no Docker Hub account, no secrets to set up.
  release:
    needs: build-images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, gui]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/plant-monitoring/${{ matrix.service == 'api' && env.API_IMAGE || env.GUI_IMAGE }}:latest
            ghcr.io/plant-monitoring/${{ matrix.service == 'api' && env.API_IMAGE || env.GUI_IMAGE }}:${{ github.sha }}