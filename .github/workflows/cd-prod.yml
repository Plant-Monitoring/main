# .github/workflows/cd-prod.yml
name: CD - Продукција
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production               # везује за producton окружење

    steps:
      - name: Code download 
        uses: actions/checkout@v4

      - name: Settings Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Dependacy installation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          # Ако користите setuptools за паковање:
          python setup.py sdist bdist_wheel
          # или ако само желите да спакујете цео код:
          tar -czf app.tar.gz src/ static/ templates/ requirements.txt

      - name: Server deployment (SCP)
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "app.tar.gz"                    # име архиве
          target: ${{ secrets.DEPLOY_PATH }}
          rm: true                                # брише старе фајлове пре слања

      - name: Start application on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            tar -xzf app.tar.gz
            rm app.tar.gz
            # Активирај виртуелно окружење и инсталирај зависности (ако треба)
            python3 -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt
            # Поново покрени сервис (нпр. systemd)
            sudo systemctl restart my-python-app