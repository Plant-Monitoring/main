# .github/workflows/ci-dev.yml
name: CI - Development branch
on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]   # прилагодите верзије

    steps:
      - name: Code download
        uses: actions/checkout@v4

      - name: Python settings ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'                     # кешира pip пакете, убрзава рад

      - name: Dependancy installation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov    # ако нису већ у requirements.txt

      - name: Starting tests with coverage
        run: pytest --cov=./ --cov-report=xml --cov-report=html

      - name: Coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/index.html